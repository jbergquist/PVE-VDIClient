  # PVE VDI Client
  - name: pve-vdiclient
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .

      # Install desktop file
      - install -D -m 0644 packaging/linux/flatpak/org.proxmox.VDIClient.desktop
        ${FLATPAK_DEST}/share/applications/org.proxmox.VDIClient.desktop

      # Install icon
      - install -D -m 0644 vdiclient/static/vdiclient.png
        ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/org.proxmox.VDIClient.png

      # Install AppStream metadata
      - install -D -m 0644 packaging/linux/flatpak/org.proxmox.VDIClient.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/org.proxmox.VDIClient.metainfo.xml

    sources:
      - type: dir
        path: ../../..
