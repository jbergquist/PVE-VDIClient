app-id: org.proxmox.VDIClient
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: vdiclient
finish-args:
  # Network access for Proxmox API
  - --share=network

  # Display access (Wayland preferred, X11 fallback)
  - --socket=wayland
  - --socket=fallback-x11

  # OpenGL/DRI for potential graphics acceleration
  - --device=dri

  # Access to virt-viewer/remote-viewer
  - --filesystem=host-os:ro

  # Config file access
  - --filesystem=xdg-config/VDIClient:create
  - --filesystem=~/.config/VDIClient:create

  # Allow launching virt-viewer
  - --talk-name=org.freedesktop.Flatpak

  # D-Bus session bus access
  - --socket=session-bus

modules:
  # Python dependencies (all pre-built wheels — no build backend required)
  - name: python-dependencies
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST}
        flask requests urllib3 proxmoxer pystray Pillow
    sources:
      # Flask and dependencies
      - type: file
