app-id: org.proxmox.VDIClient
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: vdiclient
finish-args:
  # Network access for Proxmox API
  - --share=network

  # Display access (Wayland preferred, X11 fallback)
  - --socket=wayland
  - --socket=fallback-x11

  # OpenGL/DRI for potential graphics acceleration
  - --device=dri

  # Access to virt-viewer/remote-viewer
  - --filesystem=host-os:ro

  # Config file access
  - --filesystem=xdg-config/VDIClient:create
  - --filesystem=~/.config/VDIClient:create

  # Allow launching virt-viewer
  - --talk-name=org.freedesktop.Flatpak

  # D-Bus session bus access
  - --socket=session-bus

modules:
  # Python dependencies
  - name: python-dependencies
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST}
        flit_core
      - pip3 install --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST}
        --no-build-isolation flask requests urllib3 proxmoxer pystray Pillow
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/f2/65/b6ba90634c984a4fcc02c7e3afe523fef500c4980fec67cc27536ee50acf/flit_core-3.12.0-py3-none-any.whl
        sha256: e7a0304069ea895172e3c7bb703292e992c5d1555dd1233ab7b5621b5b69e62c

      - type: file
        url: https://files.pythonhosted.org/packages/source/F/Flask/flask-3.0.3.tar.gz
        sha256: ceb27b0af3823ea2737928a4d99d125a06175b8512c445cbd9a9ce200ef76842

      - type: file
        url: https://files.pythonhosted.org/packages/source/r/requests/requests-2.32.3.tar.gz
        sha256: 55365417734eb18255590a9ff9eb97e9e1da868d4ccd6402399eaf68af20a760

      - type: file
        url: https://files.pythonhosted.org/packages/source/u/urllib3/urllib3-2.2.2.tar.gz
        sha256: dd505485549a7a552833da5e6063639d0d177c04f23bc3864e41e5dc5f612168

      - type: file
        url: https://files.pythonhosted.org/packages/source/p/proxmoxer/proxmoxer-2.0.1.tar.gz
        sha256: 088923f1a81ee27631e88314c609bfe22b33d8a41271b5f02e86f996f837fe31

      # Flask dependencies
      - type: file
        url: https://files.pythonhosted.org/packages/source/W/Werkzeug/werkzeug-3.0.3.tar.gz
        sha256: 097e5bfda9f0aba8da6b8545146def481d06aa7d3266e7448e2cccf67dd8bd18

      - type: file
        url: https://files.pythonhosted.org/packages/source/J/Jinja2/jinja2-3.1.4.tar.gz
        sha256: 4a3aee7acbbe7303aede8e9648d13b8bf88a429282aa6122a993f0ac800cb369

      - type: file
        url: https://files.pythonhosted.org/packages/source/c/click/click-8.1.7.tar.gz
        sha256: ca9853ad459e787e2192211578cc907e7594e294c7ccc834310722b41b9ca6de

      - type: file
        url: https://files.pythonhosted.org/packages/source/i/itsdangerous/itsdangerous-2.2.0.tar.gz
        sha256: e0050c0b7da1eea53ffaf149c0cfbb5c6e2e2b69c4bef22c81fa6eb73e5f6173

      - type: file
        url: https://files.pythonhosted.org/packages/source/b/blinker/blinker-1.8.2.tar.gz
        sha256: 8f77b09d3bf7c795e969e9486f39c2c5e9c39d4ee07424be2bc594ece9642d83

      - type: file
        url: https://files.pythonhosted.org/packages/source/M/MarkupSafe/MarkupSafe-2.1.5.tar.gz
        sha256: d283d37a890ba4c1ae73ffadf8046435c76e7bc2247bbb63c00bd1a709c6544b

      # tray dependencies
      - type: file
        url: https://files.pythonhosted.org/packages/5c/64/927a4b9024196a4799eba0180e0ca31568426f258a4a5c90f87a97f51d28/pystray-0.19.5-py2.py3-none-any.whl
        sha256: a0c2229d02cf87207297c22d86ffc57c86c227517b038c0d3c59df79295ac617

      - type: file
        url: https://files.pythonhosted.org/packages/1f/42/5c74462b4fd957fcd7b13b04fb3205ff8349236ea74c7c375766d6c82288/pillow-12.1.1.tar.gz
        sha256: 9ad8fa5937ab05218e2b6a4cff30295ad35afd2f83ac592e68c0d871bb0fdbc4

      # requests dependencies
      - type: file
        url: https://files.pythonhosted.org/packages/source/c/certifi/certifi-2024.7.4.tar.gz
        sha256: 5a1e7645bc0ec61a09e26c36f6106dd4cf40c6db3a1fb6352b0244e7fb057c7b

      - type: file
        url: https://files.pythonhosted.org/packages/63/09/c1bc53dab74b1816a00d8d030de5bf98f724c52c1635e07681d312f20be8/charset-normalizer-3.3.2.tar.gz
        sha256: f30c3cb33b24454a82faecaf01b19c18562b1e89558fb6c56de4d9118a032fd5

      - type: file
        url: https://files.pythonhosted.org/packages/source/i/idna/idna-3.7.tar.gz
        sha256: 028ff3aadf0609c1fd278d8ea3089299412a7a8b9bd005dd08b9f8285bcb5cfc

  # PVE VDI Client
  - name: pve-vdiclient
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .

      # Install desktop file
      - install -D -m 0644 packaging/linux/flatpak/org.proxmox.VDIClient.desktop
        ${FLATPAK_DEST}/share/applications/org.proxmox.VDIClient.desktop

      # Install icon
      - install -D -m 0644 vdiclient/static/vdiclient.png
        ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/org.proxmox.VDIClient.png

      # Install AppStream metadata
      - install -D -m 0644 packaging/linux/flatpak/org.proxmox.VDIClient.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/org.proxmox.VDIClient.metainfo.xml

    sources:
      - type: dir
        path: ../../..
